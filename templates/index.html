<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
    
</head>
<body>
    <h1>My To-Do List</h1>
    <form action="{{url_for('home')}}" class="input_container" method="POST">
        <input type="text" placeholder="Enter To-do" id="input_to-do" name="to-do_name">
        <button id="add_to-do">+</button>
    </form>
    <h2>To-do</h2>
    <div class="to-do_container">
        {% for item in items %}
        <div class="to-do">
            <p>{{item.name}}</p>
            <div class="actions">
                <form action="{{url_for('checked_todo',todo_id=item.id)}}" method="POST"> 
                    <input type="checkbox"{% if item.checked %}checked{% endif %} onchange=this.form.submit()>
                </form>
                <form action="{{url_for('delete_todo',todo_id=item.id)}}" method="POST"> 
                     <button>x</button>
                </form>
            </div>
        </div>
        {% endfor %}
              
    </div>
    
</body>
</html>
